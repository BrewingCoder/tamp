name: Release

# Publishes Tamp packages to nuget.org via trusted publishing
# (OIDC). The nuget.org policy is scoped to this exact workflow
# file under tamp-build/tamp; rename or move it and the policy
# stops trusting requests.

on:
  # Tag-driven release: pushing a v* tag triggers a real publish.
  # The tag name (minus leading "v") is passed to dotnet pack as the
  # canonical version, overriding whatever's in csproj — the tag is
  # the source of truth for shipped versions.
  push:
    tags:
      - 'v*'

  # Manual override. Defaults to dry_run=true so an accidental click
  # never publishes; flip to false to force a manual publish (e.g.,
  # the pre-launch land-grab pattern).
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, pack + login but do NOT push to nuget.org'
        type: boolean
        default: true

permissions:
  id-token: write   # OIDC token for nuget.org trusted publishing
  contents: read

env:
  DOTNET_NOLOGO: '1'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

jobs:
  publish:
    name: pack + push to nuget.org
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # source link wants the full history

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      # On tag pushes, the tag is the source of truth for the version.
      # Strips the leading "v" (so v0.1.0 → 0.1.0) and exports
      # PACKAGE_VERSION for the pack steps to consume via -p:Version.
      # On workflow_dispatch, PACKAGE_VERSION is left empty and pack
      # uses whatever <Version> is set in each csproj.
      - name: Resolve version from tag
        if: github.event_name == 'push'
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Tamp.slnx

      # Default flavor packs everything packable in the solution:
      #   Tamp.Core, Tamp.Cli (bare command), Tamp.NetCli.V8/V9/V10,
      #   Tamp.Docker.V27.
      - name: Pack (default flavor)
        run: |
          version_arg=""
          if [ -n "$PACKAGE_VERSION" ]; then version_arg="-p:Version=$PACKAGE_VERSION"; fi
          dotnet pack Tamp.slnx --no-restore --configuration Release --output ./artifacts $version_arg

      # Cli ships a second nupkg with command name "dotnet-tamp" so
      # `dotnet tamp ci` works (Cake-style). Same code, different
      # PackageId + ToolCommandName via the CliFlavor MSBuild prop.
      - name: Pack Cli (dotnet-verb flavor)
        run: |
          version_arg=""
          if [ -n "$PACKAGE_VERSION" ]; then version_arg="-p:Version=$PACKAGE_VERSION"; fi
          dotnet pack src/Tamp.Cli/Tamp.Cli.csproj --configuration Release --output ./artifacts -p:CliFlavor=DotnetVerb $version_arg

      - name: List packages
        run: ls -la ./artifacts/

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: BrewingCoder

      # Push runs on tag push always, and on workflow_dispatch only
      # when dry_run is explicitly false.
      - name: Push packages
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          set -e
          for nupkg in ./artifacts/*.nupkg; do
            echo "::group::push $(basename "$nupkg")"
            dotnet nuget push "$nupkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
            echo "::endgroup::"
          done

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          echo "DRY RUN — would have pushed:"
          ls -la ./artifacts/*.nupkg
          echo ""
          echo "Re-run with dry_run=false to actually publish."

      - name: Upload packages as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
          if-no-files-found: error
